# Common Sense — Layer 0 분석 상식
# 모든 에이전트가 도메인과 무관하게 공유하는 분석 기본 원칙.
# 에이전트 부트스트랩 시 자동 로드됨.

_meta:
  version: "1.0"
  description: "도메인 독립적 분석 상식. 모든 에이전트의 판단 기준."

# ─────────────────────────────────────────────
# 1. 소스 신뢰도 기준
# ─────────────────────────────────────────────
source_reliability:
  tiers:
    primary:
      description: "원본 데이터. 직접 생산된 1차 자료"
      examples:
        - "공식 재무제표 (감사 보고서 포함)"
        - "정부/규제기관 공식 통계"
        - "기업 IR 자료 (사업보고서, 어닝콜)"
        - "학술 논문 (peer-reviewed)"
      confidence_ceiling: high

    secondary:
      description: "1차 자료를 분석·가공한 2차 자료"
      examples:
        - "애널리스트 보고서 (증권사, 리서치 기관)"
        - "산업 리서치 기관 보고서 (Gartner, IDC, Newzoo 등)"
        - "신뢰도 높은 미디어 (Reuters, Bloomberg, 주요 경제지)"
        - "산업 협회 발간 자료"
      confidence_ceiling: high  # 단, 2개+ 독립 확인 시

    tertiary:
      description: "출처 불명확하거나 가공도가 높은 자료"
      examples:
        - "일반 뉴스 기사"
        - "블로그, 소셜 미디어"
        - "위키피디아 (출발점으로만, 최종 근거 불가)"
        - "비공식 추정치 (출처 미명시)"
      confidence_ceiling: medium  # 보조 참고만, 핵심 Claim 근거 불가

  rules:
    - "confidence: high → primary 소스 1개 + secondary 1개 이상, 또는 독립 secondary 2개+"
    - "confidence: medium → secondary 1개 이상"
    - "confidence: low → tertiary만 있을 때. 반드시 한계 명시"
    - "소스 간 불일치 시 → 범위로 표기 + 불일치 사유 명시"

# ─────────────────────────────────────────────
# 2. 수치 관례
# ─────────────────────────────────────────────
numerical_conventions:
  growth_rates:
    - "성장률은 반드시 CAGR 또는 YoY 구분 명시"
    - "기간을 명시 (예: '2023-2028 CAGR 12%')"
    - "CAGR과 YoY를 혼용하지 않음"

  market_size:
    - "시장 규모는 반드시 통화 + 연도 명시 (예: '$45B, 2025')"
    - "원문 통화 기재 + 필요 시 환산 병기 (예: $2.3B / ₩3.1조)"
    - "측정 기준 명시 (매출 기준 vs 거래액 기준)"

  ratios:
    - "비율은 반드시 분모 명시 (매출 대비? 시장 대비? 전체 대비?)"
    - "비율 합계가 100%를 초과하면 이유 명시 (중복 카운팅 등)"

  entities:
    - "그룹사/자회사 구분: [그룹] A그룹, [별도] A자회사"
    - "동일 기업은 문서 전체에서 같은 라벨 사용"
    - "시점 표기: YYYY 또는 YYYY-QN"
    - "회계 기준 명시: K-IFRS / US-GAAP / IFRS"

  estimates:
    - "추정치는 반드시 '[추정]' 라벨 표기"
    - "추정 방법 명시 (Top-down / Bottom-up / 유추)"
    - "추정 범위 제시 (점 추정보다 범위 추정 선호)"

# ─────────────────────────────────────────────
# 3. 분석 편향 방지
# ─────────────────────────────────────────────
analytical_biases:
  - name: confirmation_bias
    description: "가설을 확인하는 증거만 찾고, 반증을 무시하는 경향"
    mitigation: "Null Hypothesis Check 프로토콜 적용 — 가설의 반대를 명시적으로 검증"

  - name: survivorship_bias
    description: "성공 사례만 분석하고 실패/퇴출 사례를 무시"
    mitigation: "실패 사례/시장 퇴출 사례 최소 1건 조사 필수"

  - name: anchoring_bias
    description: "처음 접한 수치에 과도하게 의존"
    mitigation: "최소 2개 독립 소스에서 수치 확인. 첫 번째 수치에 고정하지 않음"

  - name: recency_bias
    description: "최근 데이터에 과도한 가중치 부여"
    mitigation: "최소 3년 추이 확인. 단기 변동과 구조적 변화 구분"

  - name: authority_bias
    description: "유명 기관/전문가 의견을 무비판적으로 수용"
    mitigation: "유명 소스도 교차 검증. '누가 말했는가'보다 '증거가 무엇인가'"

  - name: availability_bias
    description: "쉽게 구할 수 있는 데이터에만 의존"
    mitigation: "데이터 수집 전 필요한 데이터 목록을 먼저 작성. 빠진 데이터는 data_gap으로 식별"

  - name: framing_effect
    description: "같은 사실을 어떻게 표현하느냐에 따라 해석이 달라짐"
    mitigation: "긍정/부정 양면으로 프레이밍하여 해석 변화 확인"

# ─────────────────────────────────────────────
# 4. 흔한 분석 함정
# ─────────────────────────────────────────────
common_pitfalls:
  definitional:
    - pitfall: "TAM과 SAM 혼동"
      clarification: "TAM은 이론적 최대 시장. SAM은 실제 접근 가능한 시장. 10x+ 차이 날 수 있음"

    - pitfall: "매출(Revenue)과 거래액(GMV) 혼동"
      clarification: "GMV는 플랫폼 전체 거래 금액. 매출은 수수료만. GMV가 10배 이상 클 수 있음"

    - pitfall: "연결 재무제표와 별도 재무제표 혼동"
      clarification: "연결은 자회사 포함 전체. 별도는 모회사만. 반드시 어느 기준인지 명시"

    - pitfall: "MAU/DAU 정의 차이"
      clarification: "산업/기업마다 활성 사용자 정의가 다름. 정의를 확인하고 명시할 것"

    - pitfall: "시장 점유율 기준 차이"
      clarification: "매출 기준? 물량 기준? 사용자 수 기준? 기준에 따라 순위가 바뀜"

  methodological:
    - pitfall: "상관관계를 인과관계로 해석"
      clarification: "A와 B가 함께 변한다고 A가 B를 유발하는 것은 아님. 인과 주장 시 메커니즘 명시"

    - pitfall: "부분을 전체로 일반화"
      clarification: "한 시장/제품의 데이터를 전체 시장으로 확대 적용하지 않음. 범위 명시"

    - pitfall: "단일 시나리오만 제시"
      clarification: "전망은 반드시 복수 시나리오 (최소 Base + Downside). 단일 숫자 제시 금지"

    - pitfall: "과거 추세의 단순 연장"
      clarification: "과거 5년 CAGR을 그대로 미래에 적용하는 것은 위험. 구조적 변화 검토 필수"

  data_quality:
    - pitfall: "환율 시점에 따른 수치 차이"
      clarification: "달러 환산 시 환율 시점 명시. 연평균 vs 기말 환율로 10%+ 차이 가능"

    - pitfall: "회계 기준 차이에 따른 수치 불일치"
      clarification: "K-IFRS, US-GAAP, IFRS 간 매출/이익 인식 차이. 비교 시 기준 통일 또는 차이 명시"

    - pitfall: "데이터 빈티지(시점) 무시"
      clarification: "2023년 보고서의 '최근' 데이터가 실제로는 2022년일 수 있음. 데이터 시점 확인 필수"

# ─────────────────────────────────────────────
# 5. 추정 방법론
# ─────────────────────────────────────────────
estimation_methods:
  top_down:
    description: "전체 시장에서 비중/점유율로 분해하여 추정"
    strengths: "빠르고 전체 그림 제공"
    weaknesses: "비중 가정에 크게 의존. 과대 추정 경향"
    when_to_use: "시장 규모, 지역별 비중, 세그먼트 분해"

  bottom_up:
    description: "개별 구성 요소를 합산하여 추정"
    strengths: "구체적이고 검증 가능"
    weaknesses: "데이터 누락 시 과소 추정. 비상장/비공개 부분 반영 어려움"
    when_to_use: "기업 매출, 비용 구조, 고객 수"

  cross_validation:
    description: "Top-down과 Bottom-up을 모두 수행하여 교차 검증"
    rule: "두 방법의 차이가 20% 이내면 범위로 채택. 20%+ 차이면 원인 분석 필수"

  proxy_estimation:
    description: "직접 데이터가 없을 때 유사 데이터에서 유추"
    examples:
      - "직원 수 × 인당 매출 벤치마크 → 매출 추정"
      - "앱 다운로드 × 전환율 × ARPU → 매출 추정"
      - "인접 시장 성장률 → 해당 시장 성장률 추정"
    rule: "반드시 '[추정, 프록시: {방법}]' 라벨 표기"

# ─────────────────────────────────────────────
# 6. 분석 원칙
# ─────────────────────────────────────────────
analysis_principles:
  - name: "So What 테스트"
    rule: "모든 Claim에 '그래서 의사결정에 어떤 의미인가?'를 붙일 수 있어야 함. 순수한 사실 나열은 분석이 아님"

  - name: "MECE 체크"
    rule: "분석 범위를 나눌 때 겹침(중복)과 빠짐(누락)이 없는지 확인"

  - name: "규모감 유지"
    rule: "숫자를 제시할 때 비교 대상을 함께 제시. '1조원'이 큰지 작은지는 맥락에 따라 다름"

  - name: "불확실성 인정"
    rule: "모르면 모른다고 명시. 확신도를 부풀리지 않음. data_gap은 약점이 아니라 정직함의 증거"

  - name: "반대 의견 포함"
    rule: "핵심 Claim에 대해 반대 의견이나 반증을 1건 이상 포함. 일방적 주장은 분석이 아닌 옹호"

  # ─── applies_when 필드 해석 가이드 (v4.11) ─────────────────
  # common-sense.yaml은 parser가 없는 에이전트 프롬프트 기반 지식이다.
  # 필드 정의:
  #   - `applies_when` (optional): 원칙이 적용되는 조건. 자연어 기술.
  #     없으면 무조건 적용 (기본 동작).
  #   - `applies_when_check` (optional): 조건 확인을 위한 구체적 파일/필드 지시.
  #     에이전트가 Research Plan/Division Brief 등을 읽고 판단.
  #     없으면 `applies_when`만으로 자체 해석.
  # 에이전트 의무: 원칙을 읽을 때 applies_when이 있으면 프로젝트 컨텍스트 대조 후 적용 여부 결정.
  # parser 없음 — 자연어 규칙을 에이전트가 읽고 판단.

  - name: "전방위 기초 조사"                         # v4.11 신규
    rule: "분석 대상의 맥락을 이해하기 위한 최소 정보는 가설 유무와 무관하게 수집한다. 가설 검증만 수행하면 맥락이 빠진 단편적 분석이 된다."
    applies_when: "analysis_type in [profile, exploration] (Division Brief의 baseline_coverage 필드 참조). monitoring은 baseline 생략 — monitoring_metrics 경로로 대체"
    applies_when_check: "Research Plan(`01-research-plan.md`)의 `analysis_type` 필드를 읽어 profile/exploration인지 확인. 해당 시 baseline_coverage 수집 의무. monitoring은 monitoring_metrics만 수집."
    baseline_checklist:
      - "대상 엔터티의 핵심 지표 3년 추이 (매출/이익/MAU/인력 중 적용 가능한 것)"
      - "시장 규모와 성장률 (TAM/SAM/SOM + 5년 성장 동인)"
      - "경쟁 구조와 주요 플레이어 Top 5 (점유율, 진입장벽, 차별화)"
      - "조직 규모·인력·핵심 역량 (핵심 리더, 조직도, 스킬 구성)"
      - "공식 전략·비전 문서 (IR Day, 연차보고서, CEO 발언)"
      - "채널·유통 구조 (자체 플랫폼, 파트너, B2B/B2C 비중)"
      - "IP/자산 활용 사례 (라이선싱, 미디어 믹스, 파생 사업) — 기업 분석 시 필수"
    reference: "core/protocols/analysis-type-protocol.md#4-baseline-coverage-catalog"
    failure_mode: "가설 검증만으로는 경영진이 '이 회사가 어떤 곳인지' 맥락을 얻지 못한다. '네이버웹툰을 분석해달라'는 요청에 '웹툰 AI 도입 가설 검증' 결과만 주면 오답이다."
