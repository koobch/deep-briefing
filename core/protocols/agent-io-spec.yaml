# agent-io-spec.yaml — 에이전트 간 I/O 인터페이스 명세
#
# 모든 에이전트는 이 파일의 스키마를 준수하여 입출력한다.
# 프롬프트 자연어가 아닌 구조화된 계약으로 통신 규약을 강제한다.

---

# ============================================================
# 1. Division Brief 스키마 (PM → Lead)
# ============================================================
# PM이 Phase 1 시작 전 각 Division에 전달하는 지시서
# 경로: {project}/division-briefs/{division}.md

division_brief:
  required_fields:
    - field: division
      type: string
      description: "Division 이름 (market, product, capability, finance, people-org, operations, regulatory)"

    - field: decision_questions
      type: list
      description: "이 Division이 답해야 할 핵심 질문 (DQ). 최소 1개"
      example: "한국 게임 시장에서 AI NPC 기술의 시장 규모와 성장 전망은?"

    - field: hypotheses
      type: list
      description: "Phase 0.5에서 도출된 가설 중 이 Division 관련 항목. 검증/반증 대상"
      example: "H-01: AI NPC 시장은 2027년까지 연 25% 성장할 것이다"
      required_only_when: "analysis_type == decision (v4.11: profile/exploration/monitoring은 선택)"

    - field: verification_plan
      type: list
      description: "각 가설에 대한 Division 검증 과제"
      required_only_when: "hypotheses 존재 시 (analysis_type != monitoring)"

    - field: user_context
      type: object
      description: "사용자 프로파일 중 이 Division 관련 맥락 (domain_expertise, decision_role, risk_tolerance 등)"
      required_since: v4.11

    - field: data_gaps
      type: list
      description: "Phase 0.5 Quick Scan에서 식별된 데이터 갭. 우선 해소 대상"
      example: "한국 AI NPC 시장 규모 공식 통계 부재"

    - field: active_leaves
      type: list
      description: "스폰할 Leaf 에이전트 ID 목록. Research Plan에서 결정"
      example: "[market-sizing, competitive-landscape, customer-analysis]"

    - field: scope_boundaries
      type: string
      description: "분석 범위의 명시적 경계 (포함/제외)"

  optional_fields:
    - field: benchmarks_enabled
      type: boolean
      description: "벤치마크/피어 비교 분석 활성화 여부"

    - field: primary_data_gaps
      type: list
      description: "1차 데이터 수집이 필요한 항목"

    - field: special_instructions
      type: string
      description: "Division 특화 추가 지시 (EP 패턴, 제외 방향 등)"

    # v4.11 신규 — analysis_type 체계 (상세: core/protocols/analysis-type-protocol.md)
    - field: analysis_type
      type: enum
      values: [decision, profile, exploration, monitoring]
      required_since: v4.11
      description: "Research Plan에서 전파. 미지정 시 decision 기본값"

    - field: entity_target
      type: object
      required_since: v4.11
      applies_when: "analysis_type in [profile, exploration]"
      schema:
        type: "company | market | product | region"
        name: string
        scope: string

    - field: baseline_coverage
      type: list
      required_since: v4.11
      applies_when: "analysis_type in [profile, exploration]"
      item_schema:
        area: string                    # 예: "시장 정의·규모"
        required: boolean
        leaf: string                    # 담당 Leaf ID
        deliverables: [string, ...]     # catalog §4 기반
      description: "필수 커버리지 항목. verification_plan보다 우선 실행"

    - field: exploration_space
      type: object
      required_since: v4.11
      applies_when: "analysis_type == exploration"
      schema:
        keywords: [string, ...]
        time_horizon: string
        signal_types: [string, ...]

    - field: monitoring_metrics
      type: list
      required_since: v4.11
      applies_when: "analysis_type == monitoring"
      item_schema:
        metric: string
        source: string
        frequency: "daily | weekly | monthly | quarterly | yearly"
        threshold: string

# ============================================================
# 2. Lead ↔ Leaf 통신 계약
# ============================================================

lead_to_leaf:
  # Lead가 Leaf 스폰 시 전달해야 하는 필수 컨텍스트
  required_context:
    - item: client_brief_summary
      description: "Client Brief에서 이 Leaf 관련 부분 요약 (전문 불필요)"

    - item: division_brief_excerpt
      description: "Division Brief의 해당 Leaf 관련 DQ + 가설 + 데이터갭"

    - item: analysis_scope
      description: "이 Leaf의 분석 범위 (Leaf md의 MECE 구조 참조)"

    - item: data_sources
      description: "사용 가능한 데이터 소스 목록 (domains/{domain}/data-sources.md 참조)"

    - item: domain_knowledge
      description: "도메인 축적 지식 중 이 Leaf 관련 항목 (learned-*.yaml)"

    # v4.11 신규 — analysis_type 전파
    - item: analysis_type
      description: "decision | profile | exploration | monitoring. Research Plan의 analysis_type 전파"
      required_since: v4.11

    - item: entity_target
      description: "profile 타입 시 분석 대상 엔터티 (type/name/scope)"
      required_since: v4.11
      applies_when: "analysis_type in [profile, exploration]"

    - item: baseline_coverage
      description: "이 Leaf가 담당하는 baseline 항목 (Division Brief의 baseline_coverage 리스트에서 발췌)"
      required_since: v4.11
      applies_when: "analysis_type in [profile, exploration]"

    - item: exploration_space
      description: "탐색 공간 키워드 + 후보 가설 리스트"
      required_since: v4.11
      applies_when: "analysis_type == exploration"

    - item: monitoring_metrics
      description: "추적 지표 + 수집 주기 + 임계값"
      required_since: v4.11
      applies_when: "analysis_type == monitoring"

  # Leaf가 Lead에 반환해야 하는 필수 출력
  leaf_output_contract:
    format: "core/protocols/output-format.md 4-Layer 표준"
    required_sections:
      - section: claims
        description: "Layer 0 — 결론 목록 (ID, claim, confidence, strategic_impact)"
        min_count: 1

      - section: evidence
        description: "Layer 1 — 각 Claim의 근거 + 반증"
        rule: "모든 claim_id에 대해 1개 이상 evidence 필수"

      - section: source_index
        description: "Layer 3 — 원본 소스 목록 (ID, type, name, url, reliability)"
        min_count: 1

      - section: cross_domain_tags
        description: "다른 Division에 영향을 미치는 발견 태깅"
        rule: "선택적이나 발견 시 반드시 기록"

    file_path: "findings/{division}/{leaf-id}.yaml"

# ============================================================
# 3. .done 스키마 (Lead → PM)
# ============================================================
# Division의 Phase 완료를 PM에 알리는 시그널 파일

done_signal:
  file_path: "findings/{division}/.done"
  required_fields:
    - field: division
      type: string

    - field: phase
      type: integer
      description: "Phase 번호 (1 또는 2). 상태는 status 필드로 분리"
      values: [1, 2]

    - field: status
      type: string
      description: "Phase 진행 상태. phase와 분리하여 명확한 상태 표현"
      values: ["in_progress", "success", "partial", "error"]

    - field: completed_at
      type: datetime
      format: "YYYY-MM-DDTHH:MM:SS"
      description: "status가 success/partial일 때만 기록"

    - field: output_files
      type: list
      description: "이 Phase에서 생성/갱신된 파일 경로 목록"

    - field: summary
      type: string
      description: "Division 핵심 발견 1문장"

    - field: confidence_summary
      type: object
      description: "Claim별 confidence 분포 {high: N, medium: N, low: N, unverified: N}"

    - field: leaf_count
      type: integer
      description: "실제 스폰된 Leaf 수"

# ============================================================
# 4. .progress 스키마 (Lead 내부, 부분 완료 추적)
# ============================================================

progress_tracking:
  file_path: "findings/{division}/.progress"
  required_fields:
    - field: division
      type: string

    - field: phase
      type: integer
      description: "현재 활성 Phase (1 또는 2)"

    - field: updated_at
      type: datetime

    - field: leaves_completed
      type: list
      item_fields: [agent, file, completed_at]

    - field: leaves_in_progress
      type: list
      item_fields: [agent, reason]
      description: "미완료/진행 중 Leaf 목록. 재투입 시 이 목록만 스폰"

    - field: synthesis_status
      type: string
      values: ["pending", "in-progress", "completed"]

  phase_transition_rules:
    - "Phase 2 시작 시: send-phase2.sh가 .progress를 Phase 2용으로 리셋"
    - "Phase 1 이력은 .progress.phase1-backup에 백업"
    - "재투입 시 phase 필드가 현재 Phase와 일치하는지 먼저 확인"

# ============================================================
# 5. .status 스키마 (Lead → 모니터, 실시간 상태)
# ============================================================

status_tracking:
  file_path: "findings/{division}/.status"
  required_fields:
    - field: division
      type: string

    - field: phase
      type: integer

    - field: status
      type: string
      values: ["running", "completed", "error"]

    - field: updated_at
      type: datetime

    - field: current_leaf
      type: string
      description: "현재 실행 중인 Leaf ID"

    - field: leaves_done
      type: integer

    - field: leaves_total
      type: integer

    - field: last_event
      type: string
      description: "최근 이벤트 설명 (사람 읽기용)"

  monitoring_rules:
    - "spawn-leads.sh 모니터가 updated_at 30분 무변경 시 stuck 경고"
    - ".status 미존재 시 .done만 확인 (하위 호환)"

# ============================================================
# 6. Cross-cutting 에이전트 입출력 매트릭스
# ============================================================

cross_cutting_io:
  # 각 에이전트가 읽는 파일 / 쓰는 파일의 명시적 매트릭스
  agents:
    fact-verifier:
      reads:
        - "findings/{division}/division-synthesis.yaml (모든 활성 Division)"
        - "findings/golden-facts.yaml (기존 SSOT)"
      writes:
        - "findings/golden-facts.yaml (SSOT 갱신 — 유일한 쓰기 권한)"
        - "qa/fact-verification-report.yaml"
      trigger: "Phase 0.5, Sync Round 1/2"

    logic-prober:
      reads:
        - "sync/cross-domain-synthesis.md"
        - "findings/{division}/division-synthesis.yaml (주요 Claim)"
      writes:
        - "thinking-loop/why-probe.md"
      trigger: "Phase 3 Step 1 (SC와 병렬 실행)"

    strategic-challenger:
      reads:
        - "sync/cross-domain-synthesis.md (필수)"
        - "thinking-loop/why-probe.md (선택적 보강 — 병렬 실행 시 미존재 가능)"
        - "findings/{division}/division-synthesis.yaml"
      writes:
        - "thinking-loop/strategic-challenge.md"
      trigger: "Phase 3 Step 1 (LP와 병렬 실행. why-probe 없이도 동작)"

    red-team:
      reads:
        - "thinking-loop/strategic-challenge.md (SC 결과 참조 — Step 1 완료 후)"
        - "sync/cross-domain-synthesis.md"
        - "findings/golden-facts.yaml"
      writes:
        - "thinking-loop/red-team-report.md"
      trigger: "Phase 3 Step 2 (LP+SC 양쪽 완료 후)"

    insight-synthesizer:
      reads:
        - "thinking-loop/why-probe.md"
        - "thinking-loop/strategic-challenge.md"
        - "thinking-loop/red-team-report.md"
        - "sync/cross-domain-synthesis.md"
      writes:
        - "thinking-loop/loop-convergence.md"
        - "thinking-loop/strategy-articulations.md"
      trigger: "Phase 3 Step 3 (LP+SC+RT 모두 완료 후)"

    external-reviewer:
      reads:
        - "thinking-loop/loop-convergence.md"
        - "thinking-loop/strategy-articulations.md"
        - "sync/cross-domain-synthesis.md"
      writes:
        - "thinking-loop/self-critique.md"
        - "thinking-loop/external-review.md"
      trigger: "Phase 3.7"

    cross-domain-synthesizer:
      reads:
        - "findings/{division}/division-synthesis.yaml (모든 활성 Division)"
      writes:
        - "sync/cross-domain-synthesis.md"
        - "sync/cross-domain-synthesis.yaml"
      trigger: "Sync Round 2"

    report-writer:
      reads:
        - "sync/cross-domain-synthesis.md"
        - "thinking-loop/loop-convergence.md"
        - "thinking-loop/strategy-articulations.md"
        - "thinking-loop/self-critique.md"
        - "thinking-loop/external-review.md (선택)"
        - "findings/golden-facts.yaml"
        - "00-client-brief.md"
      writes:
        - "reports/report-docs.md"
      trigger: "Phase 4-A"

    brief-writer:
      reads:
        - "reports/report-docs.md"
        - "findings/golden-facts.yaml"
        - "thinking-loop/loop-convergence.md"
        - "thinking-loop/strategy-articulations.md"
        - "00-client-brief.md"
      writes:
        - "reports/one-pager.md"
      trigger: "Phase 4-C (선택적 — Interactive/Team 기본, Auto는 Client Brief 명시 시)"

    qa-orchestrator:
      reads:
        - "reports/report-docs.md"
        - "findings/golden-facts.yaml"
        - "reports/one-pager.md (존재 시)"
        - "01-research-plan.md (v4.11 — analysis_type + entity_target + baseline_coverage_summary)"
        - "division-briefs/*.md (v4.11 — baseline_coverage 리스트)"
      writes:
        - "qa/qa-report.md"                      # (v4.11 정정: 실제 산출물은 .md, 이전 .yaml 명세는 오기)
        - "qa/fact-verification.yaml"
      trigger: "Phase 5"
      notes: |
        v4.11 3회차 보정:
        - qa-report 실제 산출 확장자는 .md (모든 소비자 — render-report-html.py, audience-fit-checker, report-auditor)
        - 이전 명세 'qa-report.yaml'은 오기였으며 v4.11에서 정정
        - audience-fit-checker/report-auditor 스폰 시 01-research-plan.md + division-briefs/*.md 전달 의무

    report-writer:                              # v4.11 신규 — I/O 계약 명시
      reads:
        - "01-research-plan.md (v4.11 — analysis_type, entity_target, baseline_coverage_summary)"
        - "00-client-brief.md"
        - "division-briefs/*.md (v4.11 — baseline_coverage)"
        - "sync/cross-domain-synthesis.md"
        - "thinking-loop/loop-convergence.md"
        - "findings/golden-facts.yaml"
      writes:
        - "reports/report-docs.md"
      trigger: "Phase 4-A"
      notes: "analysis_type별 Step 0-pre 매트릭스 필수. 상세: report-writer.md"

    brief-writer:                               # v4.11 신규
      reads:
        - "reports/report-docs.md"
        - "01-research-plan.md (v4.11 — analysis_type, entity_target)"
        - "findings/golden-facts.yaml"
      writes:
        - "reports/one-pager.md"
      trigger: "Phase 4-C (선택적)"
      notes: "analysis_type별 BLUF/Findings/Actions 구조 분기"

    data-preprocessor:
      reads:
        - "data/user-provided/ (사용자 제공 원본)"
      writes:
        - "data/processed/{division}/"
        - "00.5-data-quality-report.md"
      trigger: "Phase 0-C"
