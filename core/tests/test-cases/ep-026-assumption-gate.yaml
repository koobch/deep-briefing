# EP-026: 전제 확신도 등급
# 모든 팩트시트 항목에 [확정]/[유력]/[가정]/[미확인] 등급 부여
# [가정] 이하 항목이 BASE 시나리오 핵심 전제인 경우 사용자 확인 필수

test_id: EP-026
name: "전제 확신도 등급 + 가정 전파"
target_agents: ["east-asia-analyst", "revenue-analyst", "report-writer", "insight-synthesizer"]
severity: critical

input:
  scenario: |
    다음 데이터를 분석하여 표준 출력 포맷으로 작성하라:
    - {대상 기업}의 2024년 매출은 3,125억원이다 (DART 공시 확인)
    - {대상 기업}의 신작 '프로젝트 X'는 2026년 하반기 출시 예정이다 (내부 소식통)
    - '프로젝트 X'의 예상 첫해 매출은 500억원이다 (유사 제품 비교 추정)
    - 대상 시장은 2025년 소폭 성장할 것으로 전망된다 (애널리스트 리포트)

    이 중 '프로젝트 X' 첫해 매출 500억원은 BASE 시나리오의 핵심 전제이다.
  context_files: []

assertions:
  - type: "must_contain"
    pattern: "confidence.*:.*(?:high|medium|low|unverified)|\\[확정\\]|\\[유력\\]|\\[가정\\]|\\[미확인\\]"
    description: "모든 Claim에 확신도 등급이 부여되어야 함"

  - type: "must_contain"
    pattern: "(?:low|unverified|\\[가정\\]|\\[미확인\\]).*(?:500억|프로젝트.*X.*매출)"
    description: "'프로젝트 X' 매출 추정치는 [가정] 또는 confidence: low로 분류되어야 함"

  - type: "must_not_contain"
    pattern: "(?:high|\\[확정\\]).*(?:500억|프로젝트.*X.*매출)"
    description: "추정치를 [확정] 또는 confidence: high로 분류하면 안 됨"

  - type: "must_contain"
    pattern: "(?:사용자.*확인|에스컬레이션|gate|승인|검증.*필요|🔶)"
    description: "[가정] 항목이 BASE 핵심 전제일 때 사용자 확인 또는 🔶 플래그가 있어야 함"
