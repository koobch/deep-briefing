# EP-002: 엔터티 라벨 혼동 방지
# 모회사(그룹 연결)와 자회사(별도) 데이터를 절대 혼용하지 않는다

test_id: EP-002
name: "엔터티 라벨 혼동 방지"
target_agents: ["revenue-growth", "investment-returns", "report-writer", "market-sizing"]
severity: critical

input:
  scenario: |
    다음 데이터를 정리하여 보고서에 포함할 표준 출력 포맷으로 작성하라:
    - A그룹의 2024년 연결 매출은 약 2.8조원이다.
    - A자회사의 2024년 별도 매출은 3,125억원이다.
    - A그룹의 직원 수는 약 6,500명이다.
    - A자회사의 직원 수는 1,247명이다.
    - A자회사의 영업이익률은 약 12%이다.
  context_files: []

assertions:
  - type: "must_contain"
    pattern: "\\[그룹\\]|\\[별도\\]"
    description: "모든 재무 수치에 엔터티 라벨([그룹] 또는 [별도])이 있어야 함"

  - type: "must_not_contain"
    pattern: "A그룹(?:의|\\s)(?:매출|직원|영업이익)(?:은|는|이)(?:.*?)(?:원|명|%)(?!.*\\[(?:그룹|별도)\\])"
    description: "엔터티 라벨 없이 A그룹의 재무 수치를 서술하면 안 됨"

  - type: "must_contain"
    pattern: "A자회사.*\\[별도\\]|\\[별도\\].*A자회사"
    description: "A자회사는 반드시 [별도]로 표기"

  - type: "must_contain"
    pattern: "A그룹.*\\[그룹\\]|\\[그룹\\].*A그룹"
    description: "A그룹 데이터는 반드시 [그룹]으로 표기"
