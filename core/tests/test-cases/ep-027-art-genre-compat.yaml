# EP-027: 제품-시장 적합도(PMF) 검증
# 신규 세그먼트로 전환하는 전략은 제품 포지셔닝, 고객 경험, 브랜드 톤의 시장 적합도를 검증해야 함

test_id: EP-027
name: "제품-시장 적합도 (포지셔닝/톤 호환성)"
target_agents: ["cx-analyst", "product-strategy-analyst", "insight-synthesizer", "strategic-challenger"]
severity: critical

input:
  scenario: |
    {대상 기업}의 브랜드 '{브랜드명}'을 활용한 세그먼트B 진출 전략을 분석하라.

    '{브랜드명}' 브랜드 특성:
    - 제품 포지셔닝: 엔터프라이즈 대상 프리미엄 B2B 솔루션
    - 톤: 전문적이고 복잡한 기능 중심, 고관여 의사결정
    - 타겟: 대기업 IT/운영 담당자 (의사결정 사이클 6~12개월)

    신규 세그먼트(SMB) 특성:
    - 주류 포지셔닝: 셀프서비스, 직관적 UI, 빠른 온보딩
    - 톤: 가볍고 실용적, 즉각적 가치 제시
    - 타겟: 중소기업 비IT 담당자 (의사결정 사이클 1~4주)

    이 조합의 전략적 타당성을 표준 출력 포맷으로 평가하라.
  context_files: []

assertions:
  - type: "must_contain"
    pattern: "(?:포지셔닝|톤|호환성|적합도|미스매치|불일치|PMF|product.market.fit)"
    description: "포지셔닝/톤의 시장 적합도 분석이 포함되어야 함"

  - type: "must_contain"
    pattern: "(?:성공.*사례|선례|Top.*\\d|벤치마크|레퍼런스)"
    description: "목표 세그먼트 성공 사례와의 비교가 포함되어야 함"

  - type: "must_contain"
    pattern: "(?:엔터프라이즈.*SMB|SMB.*엔터프라이즈).*(?:전환.*사례|성공.*선례|레퍼런스)|(?:브랜드.*분리|별도.*브랜드|투트랙)"
    description: "엔터프라이즈→SMB 브랜드 전환 사례 또는 분리 전략 검토가 포함되어야 함"

  - type: "must_contain"
    pattern: "(?:\\[가정\\].*Critical|Critical.*\\[가정\\]|confidence.*:.*low|strategic_impact.*:.*high.*confidence.*:.*low|위험|리스크|경고)"
    description: "검증되지 않은 세그먼트 전환은 Critical 리스크 또는 [가정] Critical로 분류되어야 함"

  - type: "must_not_contain"
    pattern: "confidence.*:.*high.*(?:SMB.*진출|세그먼트B.*전환|{브랜드명}.*SMB)"
    description: "선례 없는 세그먼트 전환을 confidence: high로 판정하면 안 됨"
